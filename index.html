<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemLearn - Periodic Table Pro</title>
    <style>
        :root {
            --bg-dark: #0f172a; --sidebar-color: #1e293b; --accent-color: #38bdf8;
            --text-light: #f1f5f9; --alkali: #f87171; --alkaline: #fb923c;
            --transition: #facc15; --basic-metal: #a3e635; --semimetal: #2dd4bf;
            --nonmetal: #60a5fa; --halogen: #818cf8; --noble: #c084fc;
            --lanthanide: #4ade80; --actinide: #22c55e;
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-light); overflow: hidden; display: flex; }

        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 999; }
        .overlay.active { opacity: 1; visibility: visible; }

        
        .sidebar { width: 70px; height: 100vh; background: var(--sidebar-color); transition: 0.3s ease; position: fixed; z-index: 1000; border-right: 1px solid #334155; }
        .sidebar.active { width: 230px; }
        .toggle-btn { padding: 20px 25px; cursor: pointer; color: var(--accent-color); font-size: 20px; }
        .menu-item { display: flex; align-items: center; padding: 15px 22px; cursor: pointer; white-space: nowrap; }
        .menu-item:hover { background: #334155; }
        .text { margin-left: 15px; opacity: 0; transition: 0.2s; }
        .sidebar.active .text { opacity: 1; }

        
        .content { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: padding 0.4s ease; }
        .content h1 { text-align: center; font-size: 1.8rem; font-weight: 800; margin: 0 0 20px 0; text-transform: uppercase; background: linear-gradient(to right, #38bdf8, #f1f5f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 50px); 
            grid-template-rows: repeat(10, 50px);
            gap: 2px; 
            margin: 0 auto;
            transform-origin: center top;
            position: relative; 
            z-index: 1;
        }       
        .element {
            cursor: pointer;
            z-index: 10; 
            pointer-events: auto; 
            width: 50px; height: 50px; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; color: #000; font-weight: bold; }
        .element:hover { transform: scale(1.2); z-index: 10; filter: brightness(1.1); }
        .element .number { font-size: 0.7rem; }
        .element .symbol { font-size: 1.1rem; }

        
        .alkali { background: var(--alkali); } .alkaline { background: var(--alkaline); } .transition { background: var(--transition); }
        .basic-metal { background: var(--basic-metal); } .semimetal { background: var(--semimetal); } .nonmetal { background: var(--nonmetal); }
        .halogen { background: var(--halogen); } .noble { background: var(--noble); } .lanthanide { background: var(--lanthanide); } .actinide { background: var(--actinide); }

        
        .info-panel { position: fixed; right: -400px; top: 0; width: 320px; height: 100vh; background: #1e293b; padding: 25px; box-shadow: -10px 0 30px rgba(0,0,0,0.5); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1001; overflow-y: auto; }
        .info-panel.active { right: 0; }
        .close-btn { float: right; cursor: pointer; font-size: 28px; color: #94a3b8; }
        #detMore table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        #detMore table td { padding: 8px 0; border-bottom: 1px solid #334155; font-size: 0.85rem; }
        #detMore table td:first-child { color: var(--accent-color); font-weight: 600; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
    <div class="menu-item"><div>⚛️</div><div class="text">Bảng tuần hoàn</div></div>
    <div class="menu-item"><div>🃏</div><div class="text">Flashcards</div></div>
</div>

<div class="info-panel" id="infoPanel">
    <span class="close-btn">×</span>
    <h1 id="detName" style="color:var(--accent-color); margin: 0; font-size: 1.5rem;">-</h1>
    <p><strong>Số hiệu:</strong> <span id="detNum">-</span></p>
    <div id="detMore"></div>
</div>

<div class="content" id="mainContent">
    <h1>Bảng Tuần Hoàn Nguyên Tố</h1>
    <div class="periodic-table" id="periodicTable"></div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
